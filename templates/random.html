<!DOCTYPE html>
<html>
<head>
    <title>Penguin Predictor</title>
    <style>
        * {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #f4f3fb;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem 1rem;
  color: #1a1a2e;
}

.container {
  background: #ffffff;
  border-radius: 16px;
  border: 0.5px solid rgba(0,0,0,0.1);
  padding: 2.5rem 2rem 2rem;
  width: 100%;
  max-width: 480px;
}

h1 {
  font-size: 22px;
  font-weight: 500;
  text-align: center;
  margin-bottom: 0.25rem;
}

form {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-top: 1.5rem;
}

input[type="number"],
select {
  width: 100%;
  height: 40px;
  border: 0.5px solid rgba(0,0,0,0.2);
  border-radius: 8px;
  padding: 0 12px;
  font-size: 14px;
  background: #fafafa;
  color: #1a1a2e;
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}

input[type="number"]:focus,
select:focus {
  border-color: #7F77DD;
  box-shadow: 0 0 0 3px rgba(127,119,221,0.18);
}

button[type="submit"] {
  grid-column: 1 / -1;
  height: 44px;
  border-radius: 8px;
  border: none;
  background: #534AB7;
  color: #fff;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  margin-top: 4px;
  transition: background 0.15s, transform 0.1s;
}

button[type="submit"]:hover { background: #3C3489; }
button[type="submit"]:active { transform: scale(0.98); }

h2 {
  margin-top: 1.5rem;
  font-size: 15px;
  font-weight: 400;
  text-align: center;
  color: #534AB7;
  background: #EEEDFE;
  border-radius: 8px;
  padding: 0.75rem 1rem;
}
    </style>
</head>

<body>

<div class="container">

    <h1>Penguin Species Predictor</h1>

    <form action="/predict" method="post">

        <input type="number" step="any" name="bill_length"
               placeholder="Bill Length" required>

        <input type="number" step="any" name="bill_depth"
               placeholder="Bill Depth" required>

        <input type="number" step="any" name="flipper_length"
               placeholder="Flipper Length" required>

        <input type="number" step="any" name="body_mass"
               placeholder="Body Mass" required>

        <select name="sex">
            <option value="0">Female</option>
            <option value="1">Male</option>
        </select>

        <select name="island">
            <option value="0">Biscoe</option>
            <option value="1">Dream</option>
            <option value="2">Torgersen</option>
        </select>

        <button type="submit">Predict</button>

    </form>

    <h2>{{ prediction_text }}</h2>

</div>

</body>
</html>
